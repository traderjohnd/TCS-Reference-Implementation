services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: tcs
      POSTGRES_USER: tcs
      POSTGRES_PASSWORD: tcs_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tcs -d tcs"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
